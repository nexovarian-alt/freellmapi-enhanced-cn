name: Publish Enhanced CN image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Image version tag
        required: true
        default: v1.0.0
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/freellmapi-enhanced-cn:${{ inputs.version || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/freellmapi-enhanced-cn:latest
